<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="img/morgen.png">
    <link rel="apple-touch-icon" sizes="152x152" href="img/morgen.png">
    <link rel="apple-touch-icon" sizes="180x180" href="img/morgen.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>MORGENSHTERN</title>
    <style>
        :root {
            --nav: linear-gradient(to bottom, #7e9bbc, #56789f 50%, #466993 50%, #3b5a81);
            --silver: linear-gradient(to bottom, #e8e8e8, #c8c8c8 50%, #b8b8b8 50%, #a8a8a8);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%;
            background: #2a2f38;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            user-select: none; -webkit-tap-highlight-color: transparent;
            overflow: hidden; overscroll-behavior: none;
        }
        .app { width: 100%; height: 100dvh; display: flex; flex-direction: column; }

        .navbar {
            height: 44px; background: var(--nav);
            border-bottom: 1px solid #2a3a4e;
            display: flex; align-items: center; justify-content: center;
            position: relative; flex-shrink: 0;
        }
        .nav-title { color: #fff; font-size: 17px; font-weight: bold; text-shadow: 0 -1px 0 rgba(0,0,0,.6); }
        .back-btn {
            position: absolute; left: 6px;
            height: 29px; padding: 0 10px 0 18px; line-height: 29px;
            color: #fff; font-size: 12px; font-weight: bold; display: none;
            background: linear-gradient(to bottom, #6d88ab, #405f87);
            border: 1px solid #314a6b; border-radius: 5px;
            text-shadow: 0 -1px 0 rgba(0,0,0,.6);
            clip-path: polygon(10px 0%, 100% 0%, 100% 100%, 10px 100%, 0% 50%);
        }
        .back-btn:active { filter: brightness(.8); }

        button, .track-item, .main-btn {
            touch-action: manipulation;
        }

        .screen { flex: 1; width: 100%; display: none; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .screen.active { display: flex; }

        /* Главный */
        .main-screen { background: linear-gradient(180deg, #3a404a, #2a2f38); }
        .main-content { padding: 24px 20px; text-align: center; }
        .main-title { font-size: 22px; font-weight: bold; color: #fff; letter-spacing: 2px; margin-bottom: 4px; }
        .main-sub { color: #8a9aaa; font-size: 13px; margin-bottom: 22px; }
        .cover-wrap {
            width: 200px; height: 200px; margin: 0 auto 28px;
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,.6);
        }
        .cover-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .main-btn {
            display: flex; align-items: center; justify-content: space-between;
            width: 90%; max-width: 300px; margin: 10px auto; padding: 0 14px;
            height: 46px;
            background: linear-gradient(to bottom, #565e6a, #3e444f);
            border: 1px solid #2a2f38; border-radius: 10px;
            font-size: 16px; font-weight: bold; color: #e8eef5; text-decoration: none;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
        }
        .main-btn:active { filter: brightness(.75); transform: scale(.97); }
        .btn-arrow { color: #6a7a8a; }

        #dlBar { display: none; margin: 14px auto 0; width: 90%; max-width: 300px; font-size: 12px; color: #8a9aaa; text-align: center; }
        #dlTrack { width: 100%; height: 4px; background: rgba(255,255,255,.1); border-radius: 2px; margin-top: 6px; overflow: hidden; }
        #dlFill { height: 100%; width: 0; background: linear-gradient(to right, #4a8ade, #6aab6a); border-radius: 2px; transition: width .4s; }

        /* Список */
        .track-list { list-style: none; background: #1c1f24; flex: 1; display: flex; flex-direction: column; }
        .track-item { display: flex; align-items: center; padding: 10px 14px; border-bottom: 1px solid #2a2f38; position: relative; overflow: hidden; }
        .track-item:active { background: rgba(255,255,255,.06); }
        .track-thumb { width: 48px; height: 48px; border-radius: 6px; margin-right: 12px; object-fit: cover; flex-shrink: 0; }
        .track-info { flex: 1; min-width: 0; }
        .track-name { font-size: 16px; font-weight: bold; color: #f0f4f8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 12px; color: #7a8a9a; margin-top: 2px; }
        .chevron { width: 8px; height: 8px; border-top: 2px solid #4a5a6a; border-right: 2px solid #4a5a6a; transform: rotate(45deg); margin-left: 10px; flex-shrink: 0; }
        .track-item.playing .track-name { color: #4a9af5; }
        .track-item.playing .track-artist { color: #3a7ac5; }
        .eq-icon { display: none; margin-right: 10px; flex-shrink: 0; }
        .track-item.playing .eq-icon { display: flex; gap: 2px; align-items: flex-end; height: 18px; }
        .eq-bar { width: 3px; background: #4a9af5; border-radius: 1px; animation: eq .6s ease-in-out infinite alternate; }
        .eq-bar:nth-child(1) { height: 6px; }
        .eq-bar:nth-child(2) { height: 12px; animation-delay: .2s; }
        .eq-bar:nth-child(3) { height: 8px;  animation-delay: .1s; }
        @keyframes eq { to { height: 18px; } }
        .list-spacer { flex: 1; background: #1c1f24; }

        /* Плеер */
        .player-screen { background: linear-gradient(180deg, #1a1d22, #0e1014); }
        .player-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 18px 24px 24px; }

        .disc-wrap { width: 220px; height: 220px; position: relative; margin-bottom: 24px; }
        .disc {
            width: 220px; height: 220px; border-radius: 50%;
            background: radial-gradient(circle, #111 0%, #222 20%, #111 35%, #1a1a1a 50%);
            box-shadow: 0 6px 30px rgba(0,0,0,.8), 0 0 0 1px #333;
            position: relative; overflow: hidden;
            animation: spin 8s linear infinite; animation-play-state: paused;
        }
        .disc.spinning { animation-play-state: running; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .disc-art {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 96px; height: 96px; border-radius: 50%; object-fit: cover;
            box-shadow: 0 0 0 3px #111, 0 0 0 5px #333;
        }
        .disc::after {
            content: ''; position: absolute; inset: 0; border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,.12) 0%, transparent 55%);
            pointer-events: none;
        }
        .disc-hole {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 12px; height: 12px; border-radius: 50%;
            background: #000; border: 1px solid #444; z-index: 2;
        }

        .player-title { font-size: 20px; font-weight: bold; color: #f0f4ff; text-align: center; margin-bottom: 4px; }
        .player-artist { font-size: 14px; color: #6a7a8a; margin-bottom: 20px; }

        .seek-bar { width: 100%; height: 4px; background: #2a2f38; border-radius: 2px; cursor: pointer; position: relative; margin-bottom: 6px; }
        .seek-fill { height: 100%; width: 0%; background: linear-gradient(to right, #4a7ad5, #6aaaf5); border-radius: 2px; position: relative; }
        .seek-fill::after { content: ''; position: absolute; right: -5px; top: -4px; width: 12px; height: 12px; border-radius: 50%; background: #fff; }
        .seek-times { display: flex; justify-content: space-between; font-size: 11px; color: #4a5a6a; margin-bottom: 18px; }

        .controls { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 24px; }
        .ctrl-btn {
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; border: none; cursor: pointer; background: none;
            -webkit-tap-highlight-color: transparent;
        }
        .ctrl-btn:active { transform: scale(.88); filter: brightness(.7); }
        .btn-prev, .btn-next {
            width: 52px; height: 52px;
            background: var(--silver); border: 1px solid #999;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.5);
        }
        .btn-prev svg, .btn-next svg { width: 22px; height: 22px; fill: #333; }
        .btn-play {
            width: 72px; height: 72px;
            background: radial-gradient(circle at 40% 35%, #e8e8e8, #a0a0a0);
            border: 1px solid #888;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.6);
        }
        .btn-play svg { width: 30px; height: 30px; fill: #333; }

        .volume-row { display: flex; align-items: center; gap: 10px; width: 100%; }
        .vol-icon { font-size: 16px; color: #4a5a6a; flex-shrink: 0; }
        .vol-track { flex: 1; height: 4px; background: #2a2f38; border-radius: 2px; cursor: pointer; }
        .vol-fill { height: 100%; width: 70%; background: linear-gradient(to right, #4a7ad5, #6aaaf5); border-radius: 2px; pointer-events: none; }
    </style>
</head>
<body>
<div class="app">
    <div class="navbar">
        <div class="back-btn" id="backBtn" onclick="goBack()">Назад</div>
        <div class="nav-title" id="navTitle">MORGENSHTERN</div>
    </div>

    <div class="screen main-screen active" id="mainScreen">
        <div class="main-content">
            <div class="cover-wrap"><img src="img/morgen.jpg" alt=""></div>
            <div class="main-title">MORGENSHTERN</div>
            <div class="main-sub">Музыка без интернета</div>
            <a href="#" class="main-btn" onclick="openTracks()"><span>Слушать треки</span><span class="btn-arrow">›</span></a>
            <a href="https://github.com/Gibsy" target="_blank" class="main-btn"><span>Авторы</span><span class="btn-arrow">›</span></a>
            <a href="#" class="main-btn" onclick="exitApp()"><span>Выход</span><span></span></a>
            <div id="dlBar"><span id="dlLabel">Сохраняем треки…</span><div id="dlTrack"><div id="dlFill"></div></div></div>
        </div>
    </div>

    <div class="screen" id="trackScreen">
        <ul class="track-list" id="trackList"></ul>
        <div class="list-spacer"></div>
    </div>

    <div class="screen player-screen" id="playerScreen">
        <div class="player-content">
            <div class="disc-wrap">
                <div class="disc" id="disc">
                    <img class="disc-art" id="discArt" src="img/morgen.jpg" alt="">
                    <div class="disc-hole"></div>
                </div>
            </div>
            <div class="player-title" id="playerTitle">—</div>
            <div class="player-artist" id="playerArtist">MORGENSHTERN</div>
            <div class="seek-bar" id="seekBar"><div class="seek-fill" id="seekFill"></div></div>
            <div class="seek-times"><span id="timeNow">0:00</span><span id="timeTotal">0:00</span></div>
            <div class="controls">
                <button class="ctrl-btn btn-prev" onclick="prevTrack()"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
                <button class="ctrl-btn btn-play" id="playBtn" onclick="togglePlay()"><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
                <button class="ctrl-btn btn-next" onclick="nextTrack()"><svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM5 6l8.5 6L5 18z"/></svg></button>
            </div>
            <div class="volume-row">
                <span class="vol-icon">🔈</span>
                <div class="vol-track" id="volTrack"><div class="vol-fill" id="volFill"></div></div>
                <span class="vol-icon">🔊</span>
            </div>
        </div>
    </div>
</div>

<audio id="audio" playsinline preload="metadata"></audio>

<script>

    const audio = document.getElementById('audio');
    const $ = id => document.getElementById(id);

    const TRACKS = [
        { title:'ICE', artist:'MORGENSHTERN', src:'audio/ice.mp3', img:'img/ice.jpg' },
        { title:'Cadillac', artist:'MORGENSHTERN', src:'audio/cadillac.mp3', img:'img/cadillac.jpg' },
        { title:'Дуло', artist:'MORGENSHTERN', src:'audio/dulo.mp3', img:'img/dulo.jpg' }
    ];

    let cur = 0;
    let playing = false;

    // 1. Фикс для iOS: разблокировка аудио по первому тапу
    document.addEventListener('touchstart', function() {
        if (!audio.src || audio.src === "") {
            audio.src = TRACKS[0].src;
            audio.load();
            audio.play().then(() => audio.pause());
        }
    }, { once: true });

    // 2. Единая функция загрузки и воспроизведения
    function loadAndPlay(i) {
        cur = i;
        const t = TRACKS[i];

        // Приоритет 1: Запуск звука
        audio.src = t.src;
        audio.load();

        const playPromise = audio.play();

        // Приоритет 2: Обновление интерфейса
        if (playPromise !== undefined) {
            playPromise.then(() => {
                playing = true;
                updateUI(t);
            }).catch(err => {
                console.log("Playback error:", err);
                // Если автоплей заблокирован, всё равно открываем плеер
                updateUI(t);
            });
        }
    }

    function updateUI(t) {
        $('playerTitle').textContent = t.title;
        $('playerArtist').textContent = t.artist;
        $('discArt').src = t.img;
        $('navTitle').innerText = t.title;
        setIcon(true);
        $('disc').classList.add('spinning');
        openPlayer();
        highlight();
    }

    // 3. Исправленная функция Паузы/Плея
    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playing = true;
            setIcon(true);
            $('disc').classList.add('spinning');
        } else {
            audio.pause();
            playing = false;
            setIcon(false);
            $('disc').classList.remove('spinning');
        }
        highlight();
    }

    // 4. Корректный таймлайн
    audio.addEventListener('timeupdate', () => {
        if (isNaN(audio.duration)) return;

        const percent = (audio.currentTime / audio.duration) * 100;
        $('seekFill').style.width = percent + '%';

        $('timeNow').textContent = formatTime(audio.currentTime);
        $('timeTotal').textContent = formatTime(audio.duration);
    });

    function formatTime(s) {
        if (isNaN(s)) return "0:00";
        let m = Math.floor(s / 60);
        let sec = Math.floor(s % 60);
        return m + ":" + (sec < 10 ? '0' : '') + sec;
    }

    // 5. Навигация и прочее
    function nextTrack() { loadAndPlay((cur + 1) % TRACKS.length); }
    function prevTrack() { loadAndPlay((cur - 1 + TRACKS.length) % TRACKS.length); }
    audio.addEventListener('ended', nextTrack);

    function setIcon(isPlay) {
        $('playIcon').innerHTML = isPlay
            ? '<path d="M6 19h4V5H6zm8-14v14h4V5z"/>' // Иконка паузы
            : '<path d="M8 5v14l11-7z"/>';         // Иконка плея
    }

    // HIGHLIGHT
    function highlight() {

        document.querySelectorAll('.track-item')
            .forEach((el, i) => {
                el.classList.toggle(
                    'playing',
                    i === cur && playing
                );
            });
    }

    // NAVIGATION
    function openTracks() {

        renderList();

        $('navTitle').innerText = 'Треки';

        $('mainScreen').classList.remove('active');

        $('trackScreen').classList.add('active');

        $('backBtn').style.display = 'block';
    }

    function openPlayer() {

        $('navTitle').innerText = TRACKS[cur].title;

        $('trackScreen').classList.remove('active');

        $('playerScreen').classList.add('active');
    }

    function goBack() {

        if ($('playerScreen').classList.contains('active')) {

            $('playerScreen').classList.remove('active');

            $('trackScreen').classList.add('active');

            $('navTitle').innerText = 'Треки';

            highlight();

        } else {

            $('trackScreen').classList.remove('active');

            $('mainScreen').classList.add('active');

            $('navTitle').innerText = 'MORGENSHTERN';

            $('backBtn').style.display = 'none';
        }
    }

    // EXIT
    function exitApp() {

        window.close();

        setTimeout(() => {
            location.href = 'about:blank';
        }, 100);
    }

    // IOS FIX
    document.addEventListener(
        'touchmove',
        e => {
            if (!e.target.closest('.screen')) {
                e.preventDefault();
            }
        },
        { passive:false }
    );
</script>
</body>
</html>
