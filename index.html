<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="img/morgen.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MORGENSTERN</title>
</head>
<body>

<div class="app-viewport">
    <div class="navbar">
        <div class="back-button" id="backBtn" onclick="goBack()">Назад</div>
        <div class="nav-title" id="navTitle">MORGENSHTERN</div>
    </div>

    <div class="screen screen-active linen-bg" id="mainScreen">
        <div class="main-content">
            <h1 class="main-title">MORGENSHTERN</h1>
            <p class="main-subtitle">Смотреть без интернета</p>
            <div class="main-image-container">
                <img src="img/morgen.jpg" alt="Morgenshtern">
            </div>
            <a href="#" class="ios-list-btn" onclick="openClips()">Смотреть MORGENSHTERN</a>
            <a href="https://github.com/Gibsy" target="_blank" class="ios-list-btn">Авторы</a>
            <a href="#" class="ios-list-btn" onclick="exitApp()">Выход</a>

            <div id="downloadBar">
                <span id="downloadLabel">Сохраняем видео для офлайн…</span>
                <div id="downloadProgress"><div id="downloadFill"></div></div>
            </div>
        </div>
    </div>

    <div class="screen" id="clipScreen">
        <ul class="clip-list">
            <li class="clip-item" onclick="playVideo('vid_ice')">
                <img src="img/ice.jpg" class="clip-thumb">
                <span class="clip-title">ICE</span>
                <div class="arrow"></div>
            </li>
            <li class="clip-item" onclick="playVideo('vid_cadillac')">
                <img src="img/cadillac.jpg" class="clip-thumb">
                <span class="clip-title">Cadillac</span>
                <div class="arrow"></div>
            </li>
            <li class="clip-item" onclick="playVideo('vid_dulo')">
                <img src="img/dulo.jpg" class="clip-thumb">
                <span class="clip-title">Дуло</span>
                <div class="arrow"></div>
            </li>
            <li style="flex: 1; background: #fff;"></li>
        </ul>
    </div>
</div>

<video id="vid_ice"      preload="metadata" playsinline style="display:none"></video>
<video id="vid_cadillac" preload="metadata" playsinline style="display:none"></video>
<video id="vid_dulo"     preload="metadata" playsinline style="display:none"></video>

<script>
    const SRC_MAP = {
        vid_ice:      'video/output.mp4',
        vid_cadillac: 'video/Cadillac.mp4',
        vid_dulo:     'video/dulo.mp4'
    };

    const VIDEO_URLS = Object.values(SRC_MAP);

    // --- Регистрация Service Worker ---
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }

    // --- IndexedDB Helpers ---
    function openDB() {
        return new Promise((res, rej) => {
            const req = indexedDB.open('videoDB', 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore('videos');
            req.onsuccess = e => res(e.target.result);
            req.onerror   = e => rej(e.target.error);
        });
    }

    async function getVideoDB(db, url) {
        return new Promise((res) => {
            const req = db.transaction('videos', 'readonly').objectStore('videos').get(url);
            req.onsuccess = e => res(e.target.result);
            req.onerror = () => res(null);
        });
    }

    async function saveVideoDB(db, url, blob) {
        return new Promise((res) => {
            const tx = db.transaction('videos', 'readwrite');
            tx.objectStore('videos').put(blob, url);
            tx.oncomplete = res;
        });
    }

    // --- Загрузка видео в память ---
    async function downloadVideos() {
        try {
            const db = await openDB();
            let downloaded = 0;

            for (const url of VIDEO_URLS) {
                const existing = await getVideoDB(db, url);
                if (existing) {
                    downloaded++;
                    continue;
                }

                document.getElementById('downloadBar').style.display = 'block';
                const resp = await fetch(url);
                const blob = await resp.blob();
                await saveVideoDB(db, url, blob);
                downloaded++;
                updateProgress(downloaded, VIDEO_URLS.length);
            }

            if (downloaded === VIDEO_URLS.length) {
                document.getElementById('downloadLabel').textContent = 'Видео готовы ✓';
                setTimeout(() => document.getElementById('downloadBar').style.display = 'none', 2000);
            }
        } catch (e) { console.error("Ошибка БД:", e); }
    }

    function updateProgress(done, total) {
        const pct = Math.round((done / total) * 100);
        document.getElementById('downloadFill').style.width = pct + '%';
        document.getElementById('downloadLabel').textContent = `Сохраняем видео… ${done}/${total}`;
    }

    // --- Плеер ---
    async function playVideo(videoId) {
        const video = document.getElementById(videoId);
        const url = SRC_MAP[videoId];

        if (!video.dataset.blobLoaded) {
            const db = await openDB();
            const blob = await getVideoDB(db, url);
            if (blob) {
                video.src = URL.createObjectURL(blob);
                video.dataset.blobLoaded = '1';
                video.load();
            } else {
                video.src = url; // Если не скачалось, играем из сети
            }
        }

        const start = () => {
            if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
            video.play();
        };

        if (video.readyState >= 2) start();
        else video.addEventListener('loadeddata', start, { once: true });
    }

    // --- Интерфейс ---
    function openClips() {
        document.getElementById('navTitle').innerText = 'Клипы';
        document.getElementById('mainScreen').classList.remove('screen-active');
        document.getElementById('clipScreen').classList.add('screen-active');
        document.body.style.backgroundColor = '#ffffff';
        document.getElementById('backBtn').style.display = 'block';
    }

    function goBack() {
        document.getElementById('navTitle').innerText = 'MORGENSHTERN';
        document.getElementById('mainScreen').classList.add('screen-active');
        document.getElementById('clipScreen').classList.remove('screen-active');
        document.body.style.backgroundColor = 'var(--bg-gray)';
        document.getElementById('backBtn').style.display = 'none';
    }

    function exitApp() {
        window.close();
        setTimeout(() => { window.location.href = 'about:blank'; }, 100);
    }

    // Старт загрузки при запуске
    window.addEventListener('load', downloadVideos);
</script>
</body>
</html>
