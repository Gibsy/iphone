<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="img/morgen.png">
    <link rel="apple-touch-icon" sizes="152x152" href="img/morgen.png">
    <link rel="apple-touch-icon" sizes="180x180" href="img/morgen.png">
    <link rel="apple-touch-icon" sizes="167x167" href="img/morgen.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>MORGENSHTERN</title>
    <style>
        /* ── Переменные ─────────────────────────────────────────── */
        :root {
            --nav:      linear-gradient(to bottom, #7e9bbc, #56789f 50%, #466993 50%, #3b5a81);
            --bg:       #4c535d;
            --silver:   linear-gradient(to bottom, #e8e8e8 0%, #c8c8c8 50%, #b8b8b8 50%, #a8a8a8 100%);
            --glass:    linear-gradient(to bottom, rgba(255,255,255,.55) 0%, rgba(255,255,255,.08) 100%);
            --steel:    linear-gradient(135deg, #d0d0d0, #f5f5f5 40%, #c0c0c0);
            --red:      #c0392b;
            --blue:     #2060b0;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%;
            background: #1c1f24;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            user-select: none; -webkit-tap-highlight-color: transparent;
            overflow: hidden; overscroll-behavior: none;
        }
        .app { width: 100%; height: 100dvh; display: flex; flex-direction: column; }

        /* ── Навбар ─────────────────────────────────────────────── */
        .navbar {
            height: 44px; background: var(--nav);
            border-bottom: 1px solid #2a3a4e;
            display: flex; align-items: center; justify-content: center;
            position: relative; flex-shrink: 0;
            box-shadow: 0 1px 3px rgba(0,0,0,.5);
        }
        .nav-title { color: #fff; font-size: 17px; font-weight: bold; text-shadow: 0 -1px 0 rgba(0,0,0,.6); letter-spacing: .3px; }
        .back-btn {
            position: absolute; left: 6px;
            height: 29px; padding: 0 10px 0 18px; line-height: 29px;
            color: #fff; font-size: 12px; font-weight: bold;
            background: linear-gradient(to bottom, #6d88ab, #405f87);
            border: 1px solid #314a6b; border-radius: 5px; display: none;
            text-shadow: 0 -1px 0 rgba(0,0,0,.6);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.25), 0 1px 2px rgba(0,0,0,.4);
            clip-path: polygon(10px 0%, 100% 0%, 100% 100%, 10px 100%, 0% 50%);
            transition: filter .1s;
        }
        .back-btn:active { filter: brightness(.8); }

        /* ── Экраны ─────────────────────────────────────────────── */
        .screen { flex: 1; width: 100%; display: none; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .screen.active { display: flex; }

        /* ── Главный экран ──────────────────────────────────────── */
        .main-screen {
            background: linear-gradient(180deg, #3a404a 0%, #2a2f38 100%);
        }
        .main-content { padding: 24px 20px; text-align: center; }
        .main-title {
            font-size: 22px; font-weight: bold; color: #fff;
            letter-spacing: 2px; text-transform: uppercase;
            text-shadow: 0 1px 3px rgba(0,0,0,.8);
            margin-bottom: 4px;
        }
        .main-sub { color: #8a9aaa; font-size: 13px; margin-bottom: 22px; letter-spacing: .5px; }

        /* Обложка на главной */
        .main-cover-wrap {
            width: 200px; height: 200px; margin: 0 auto 28px;
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.1);
            position: relative;
        }
        .main-cover-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .main-cover-wrap::after {
            content: '';
            position: absolute; inset: 0;
            background: var(--glass);
            border-radius: 12px;
        }

        /* Кнопки главного экрана */
        .main-btn {
            display: flex; align-items: center; justify-content: space-between;
            width: 90%; max-width: 300px; margin: 10px auto; padding: 0 14px;
            height: 46px;
            background: linear-gradient(to bottom, #565e6a, #3e444f);
            border: 1px solid #2a2f38;
            border-radius: 10px;
            font-size: 16px; font-weight: bold; color: #e8eef5;
            text-decoration: none;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 2px 4px rgba(0,0,0,.4);
            transition: filter .12s, transform .12s;
            -webkit-tap-highlight-color: transparent;
        }
        .main-btn:active { filter: brightness(.75); transform: scale(.97); }
        .main-btn .btn-icon { font-size: 20px; }
        .main-btn .btn-arrow { color: #6a7a8a; font-size: 13px; }

        /* Прогресс загрузки */
        #dlBar { display: none; margin: 14px auto 0; width: 90%; max-width: 300px; font-size: 12px; color: #8a9aaa; text-align: center; }
        #dlTrack { width: 100%; height: 4px; background: rgba(255,255,255,.1); border-radius: 2px; margin-top: 6px; overflow: hidden; }
        #dlFill { height: 100%; width: 0; background: linear-gradient(to right, #4a8ade, #6aab6a); border-radius: 2px; transition: width .4s; }

        /* ── Список треков ──────────────────────────────────────── */
        .track-list { list-style: none; background: #1c1f24; flex: 1; display: flex; flex-direction: column; }
        .track-item {
            display: flex; align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid #2a2f38;
            transition: background .12s;
            position: relative; overflow: hidden;
        }
        .track-item::after {
            content: '';
            position: absolute; inset: 0;
            background: rgba(255,255,255,.08);
            opacity: 0; transition: opacity .15s;
        }
        .track-item:active::after { opacity: 1; }
        .track-thumb {
            width: 48px; height: 48px; border-radius: 6px; margin-right: 12px;
            object-fit: cover; flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(0,0,0,.5);
        }
        .track-info { flex: 1; min-width: 0; }
        .track-name { font-size: 16px; font-weight: bold; color: #f0f4f8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 12px; color: #7a8a9a; margin-top: 2px; }
        .track-dur { font-size: 12px; color: #5a6a7a; margin-left: 8px; flex-shrink: 0; }
        .chevron { width: 8px; height: 8px; border-top: 2px solid #4a5a6a; border-right: 2px solid #4a5a6a; transform: rotate(45deg); margin-left: 10px; flex-shrink: 0; }
        .track-item.playing .track-name { color: #4a9af5; }
        .track-item.playing .track-artist { color: #3a7ac5; }

        /* Иконка eq при воспроизведении */
        .eq-icon { display: none; margin-right: 10px; flex-shrink: 0; }
        .track-item.playing .eq-icon { display: flex; gap: 2px; align-items: flex-end; height: 18px; }
        .eq-bar {
            width: 3px; background: #4a9af5; border-radius: 1px;
            animation: eq .6s ease-in-out infinite alternate;
        }
        .eq-bar:nth-child(1) { height: 6px;  animation-delay: 0s; }
        .eq-bar:nth-child(2) { height: 12px; animation-delay: .2s; }
        .eq-bar:nth-child(3) { height: 8px;  animation-delay: .1s; }
        @keyframes eq { to { height: 18px; } }
        .track-item.playing .eq-bar:nth-child(1) { animation-play-state: running; }

        /* ── Плеер ──────────────────────────────────────────────── */
        .player-screen {
            background: linear-gradient(180deg, #1a1d22 0%, #0e1014 100%);
        }
        .player-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 18px 24px 24px; }

        /* Крутящаяся пластинка */
        .disc-wrap {
            width: 220px; height: 220px; position: relative;
            margin-bottom: 24px;
        }
        .disc {
            width: 220px; height: 220px; border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, #111 0%, #222 20%, #111 35%, #1a1a1a 50%);
            box-shadow: 0 8px 40px rgba(0,0,0,.9), 0 0 0 1px #333,
            inset 0 0 0 2px #000,
            inset 0 0 20px rgba(255,255,255,.03);
            position: relative; overflow: hidden;
            animation: spin 8s linear infinite;
            animation-play-state: paused;
        }
        .disc.spinning { animation-play-state: running; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Обложка внутри пластинки */
        .disc-art {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 96px; height: 96px; border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 0 0 3px #111, 0 0 0 5px #333, 0 0 0 6px #000;
        }
        /* Глянцевый блик на пластинке */
        .disc::after {
            content: '';
            position: absolute; inset: 0; border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 60%);
            pointer-events: none;
        }
        /* Дырка пластинки */
        .disc-hole {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 12px; height: 12px; border-radius: 50%;
            background: #000; border: 1px solid #444; z-index: 2;
        }
        /* Отражение под диском */
        .disc-shadow {
            position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%);
            width: 180px; height: 20px;
            background: radial-gradient(ellipse, rgba(0,0,0,.6) 0%, transparent 70%);
        }

        /* Название и артист */
        .player-title {
            font-size: 20px; font-weight: bold; color: #f0f4ff;
            text-align: center; letter-spacing: .3px;
            text-shadow: 0 1px 4px rgba(0,0,0,.8);
            margin-bottom: 4px;
            max-width: 280px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .player-artist { font-size: 14px; color: #6a7a8a; margin-bottom: 20px; }

        /* Прогресс-бар плеера */
        .seek-wrap { width: 100%; margin-bottom: 6px; }
        .seek-bar {
            width: 100%; height: 4px;
            background: #2a2f38; border-radius: 2px;
            position: relative; cursor: pointer;
        }
        .seek-fill {
            height: 100%; width: 0%; background: linear-gradient(to right, #4a7ad5, #6aaaf5);
            border-radius: 2px; transition: width .5s linear;
            position: relative;
        }
        .seek-fill::after {
            content: '';
            position: absolute; right: -5px; top: -4px;
            width: 12px; height: 12px; border-radius: 50%;
            background: radial-gradient(circle, #fff 30%, #b0c8f0 100%);
            box-shadow: 0 0 6px rgba(74,122,213,.8);
        }
        .seek-times { display: flex; justify-content: space-between; font-size: 11px; color: #4a5a6a; margin-bottom: 18px; }

        /* Кнопки управления */
        .controls { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 24px; }

        /* Металлические кнопки в стиле iOS 6 */
        .ctrl-btn {
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; border: none; cursor: pointer;
            transition: transform .1s, filter .1s;
            -webkit-tap-highlight-color: transparent;
            background: none;
        }
        .ctrl-btn:active { transform: scale(.88); filter: brightness(.7); }

        .btn-prev, .btn-next {
            width: 52px; height: 52px;
            background: var(--silver);
            border: 1px solid #999;
            box-shadow: 0 2px 5px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.6);
        }
        .btn-prev svg, .btn-next svg { width: 22px; height: 22px; fill: #333; }

        .btn-play {
            width: 72px; height: 72px;
            background: radial-gradient(circle at 40% 35%, #e8e8e8, #a0a0a0);
            border: 1px solid #888;
            box-shadow: 0 3px 10px rgba(0,0,0,.6),
            inset 0 1px 0 rgba(255,255,255,.7),
            inset 0 -2px 4px rgba(0,0,0,.2);
        }
        .btn-play svg { width: 30px; height: 30px; fill: #333; }
        .btn-play.playing svg { /* иконка паузы встроена логикой */ }

        /* Громкость */
        .volume-row { display: flex; align-items: center; gap: 10px; width: 100%; }
        .vol-icon { font-size: 16px; color: #4a5a6a; flex-shrink: 0; }
        .vol-track {
            flex: 1; height: 4px; background: #2a2f38; border-radius: 2px;
            position: relative; cursor: pointer;
        }
        .vol-fill {
            height: 100%; width: 70%; background: linear-gradient(to right, #4a7ad5, #6aaaf5);
            border-radius: 2px; pointer-events: none;
        }

        /* ── Анимация появления экрана ─────────────────────────── */
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .player-screen.active .player-content { animation: slideUp .3s ease; }

        /* ── Разделитель списка ─────────────────────────────────── */
        .list-spacer { flex: 1; background: #1c1f24; }
    </style>
</head>
<body>
<div class="app">
    <div class="navbar">
        <div class="back-btn" id="backBtn" onclick="goBack()">◀ Назад</div>
        <div class="nav-title" id="navTitle">MORGENSHTERN</div>
    </div>

    <!-- ── Главный экран ── -->
    <div class="screen main-screen active" id="mainScreen">
        <div class="main-content">
            <div class="main-cover-wrap">
                <img src="img/morgen.jpg" alt="Morgenshtern">
            </div>
            <div class="main-title">MORGENSHTERN</div>
            <div class="main-sub">Музыка без интернета</div>

            <a href="#" class="main-btn" onclick="openTracks()">
                <span class="btn-icon">🎵</span>
                <span>Слушать треки</span>
                <span class="btn-arrow">›</span>
            </a>
            <a href="https://github.com/Gibsy" target="_blank" class="main-btn">
                <span class="btn-icon">👤</span>
                <span>Авторы</span>
                <span class="btn-arrow">›</span>
            </a>
            <a href="#" class="main-btn" onclick="exitApp()">
                <span class="btn-icon">✕</span>
                <span>Выход</span>
                <span class="btn-arrow"></span>
            </a>

            <div id="dlBar">
                <span id="dlLabel">Сохраняем треки…</span>
                <div id="dlTrack"><div id="dlFill"></div></div>
            </div>
        </div>
    </div>

    <!-- ── Список треков ── -->
    <div class="screen" id="trackScreen">
        <ul class="track-list" id="trackList">
            <!-- генерируется JS -->
        </ul>
        <div class="list-spacer"></div>
    </div>

    <!-- ── Плеер ── -->
    <div class="screen player-screen" id="playerScreen">
        <div class="player-content">
            <div class="disc-wrap">
                <div class="disc" id="disc">
                    <img class="disc-art" id="discArt" src="img/morgen.jpg" alt="">
                    <div class="disc-hole"></div>
                </div>
                <div class="disc-shadow"></div>
            </div>

            <div class="player-title" id="playerTitle">—</div>
            <div class="player-artist" id="playerArtist">MORGENSHTERN</div>

            <div class="seek-wrap">
                <div class="seek-bar" id="seekBar">
                    <div class="seek-fill" id="seekFill"></div>
                </div>
            </div>
            <div class="seek-times">
                <span id="timeNow">0:00</span>
                <span id="timeTotal">0:00</span>
            </div>

            <div class="controls">
                <button class="ctrl-btn btn-prev" onclick="prevTrack()">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
                </button>
                <button class="ctrl-btn btn-play" id="playBtn" onclick="togglePlay()">
                    <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="ctrl-btn btn-next" onclick="nextTrack()">
                    <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM5 6l8.5 6L5 18z"/></svg>
                </button>
            </div>

            <div class="volume-row">
                <span class="vol-icon">🔈</span>
                <div class="vol-track" id="volTrack">
                    <div class="vol-fill" id="volFill"></div>
                </div>
                <span class="vol-icon">🔊</span>
            </div>
        </div>
    </div>
</div>

<audio id="audio" preload="none"></audio>

<script>
    // ── Треки ──────────────────────────────────────────────────────────────────
    const TRACKS = [
        { id: 'ice',      title: 'ICE',      artist: 'MORGENSHTERN', src: '/audio/ice.mp3',      img: 'img/ice.jpg' },
        { id: 'cadillac', title: 'Cadillac', artist: 'MORGENSHTERN', src: '/audio/cadillac.mp3', img: 'img/cadillac.jpg' },
        { id: 'dulo',     title: 'Дуло',     artist: 'MORGENSHTERN', src: '/audio/dulo.mp3',     img: 'img/dulo.jpg' },
    ];

    const audio    = document.getElementById('audio');
    let curIdx     = 0;
    let isPlaying  = false;

    // ── Service Worker + скачивание ────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(reg => {
            const sw = reg.installing || reg.waiting || reg.active;
            reg.active ? dlAll() : sw.addEventListener('statechange', e => {
                if (e.target.state === 'activated') dlAll();
            });
        });
    }

    function openDB() {
        return new Promise((res, rej) => {
            const r = indexedDB.open('audioDB', 1);
            r.onupgradeneeded = e => e.target.result.createObjectStore('audio');
            r.onsuccess = e => res(e.target.result);
            r.onerror   = e => rej(e.target.error);
        });
    }
    const dbGet = (db, k) => new Promise((res, rej) => {
        const r = db.transaction('audio','readonly').objectStore('audio').get(k);
        r.onsuccess = e => res(e.target.result); r.onerror = e => rej(e.target.error);
    });
    const dbPut = (db, k, v) => new Promise((res, rej) => {
        const tx = db.transaction('audio','readwrite');
        tx.objectStore('audio').put(v, k); tx.oncomplete = res; tx.onerror = e => rej(e.target.error);
    });

    async function dlAll() {
        const db = await openDB();
        let done = 0, needDl = false;
        for (const t of TRACKS) {
            const ex = await dbGet(db, t.src).catch(() => null);
            if (!ex) { needDl = true; break; }
        }
        if (needDl) document.getElementById('dlBar').style.display = 'block';

        for (const t of TRACKS) {
            const ex = await dbGet(db, t.src).catch(() => null);
            if (!ex) {
                try { await dbPut(db, t.src, await fetch(t.src).then(r => r.blob())); }
                catch(e) { console.warn('Ошибка:', t.src); }
            }
            done++;
            document.getElementById('dlFill').style.width = Math.round(done / TRACKS.length * 100) + '%';
            document.getElementById('dlLabel').textContent =
                done < TRACKS.length ? `Сохраняем… ${done}/${TRACKS.length}` : 'Треки готовы ✓';
        }
        setTimeout(() => document.getElementById('dlBar').style.display = 'none', 2000);
    }

    // ── Рендер списка ──────────────────────────────────────────────────────────
    function renderList() {
        const ul = document.getElementById('trackList');
        ul.innerHTML = '';
        TRACKS.forEach((t, i) => {
            const li = document.createElement('li');
            li.className = 'track-item' + (i === curIdx && isPlaying ? ' playing' : '');
            li.id = 'ti_' + i;
            li.onclick = () => loadAndPlay(i);
            li.innerHTML = `
            <div class="eq-icon"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
            <img class="track-thumb" src="${t.img}" alt="">
            <div class="track-info">
                <div class="track-name">${t.title}</div>
                <div class="track-artist">${t.artist}</div>
            </div>
            <div class="chevron"></div>`;
            ul.appendChild(li);
        });
    }

    // ── Загрузка и воспроизведение ─────────────────────────────────────────────
    function loadAndPlay(idx) {
        curIdx = idx;
        const t = TRACKS[idx];

        // UI сразу
        document.getElementById('playerTitle').textContent  = t.title;
        document.getElementById('playerArtist').textContent = t.artist;
        document.getElementById('discArt').src = t.img;
        openPlayer();

        // Сначала пробуем играть из обычного src (синхронно — iOS разрешит)
        audio.pause();
        audio.src = t.src;
        audio.play().then(() => {
            isPlaying = true;
            setPlayIcon(true);
            document.getElementById('disc').classList.add('spinning');
            updateListHighlight();
        }).catch(() => {
            // Сеть недоступна — пробуем blob из IndexedDB
            openDB().then(db => dbGet(db, t.src)).then(blob => {
                if (blob) {
                    audio.src = URL.createObjectURL(blob);
                    audio.play().then(() => {
                        isPlaying = true;
                        setPlayIcon(true);
                        document.getElementById('disc').classList.add('spinning');
                        updateListHighlight();
                    }).catch(e => console.warn(e));
                }
            }).catch(e => console.warn(e));
        });
    }

    function togglePlay() {
        if (audio.paused) {
            audio.play().then(() => {
                isPlaying = true;
                setPlayIcon(true);
                document.getElementById('disc').classList.add('spinning');
                updateListHighlight();
            }).catch(e => console.warn(e));
        } else {
            audio.pause();
            isPlaying = false;
            setPlayIcon(false);
            document.getElementById('disc').classList.remove('spinning');
            updateListHighlight();
        }
    }

    function prevTrack() { loadAndPlay((curIdx - 1 + TRACKS.length) % TRACKS.length); }
    function nextTrack() { loadAndPlay((curIdx + 1) % TRACKS.length); }

    audio.addEventListener('ended', () => nextTrack());

    // Прогресс
    audio.addEventListener('timeupdate', () => {
        const dur = parseFloat(audio.duration);
        const cur = parseFloat(audio.currentTime);
        if (!dur || !isFinite(dur)) return;
        document.getElementById('seekFill').style.width = (cur / dur * 100) + '%';
        document.getElementById('timeNow').textContent   = fmt(cur);
        document.getElementById('timeTotal').textContent = fmt(dur);
    });

    function fmt(s) {
        s = Math.floor(s);
        if (!s || !isFinite(s) || s < 0) return '0:00';
        const m   = Math.floor(s / 60);
        const sec = s % 60;
        return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    // Перемотка
    document.getElementById('seekBar').addEventListener('click', e => {
        if (!audio.duration) return;
        const r = e.currentTarget.getBoundingClientRect();
        audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
    });

    // Громкость
    document.getElementById('volTrack').addEventListener('click', e => {
        const r = e.currentTarget.getBoundingClientRect();
        const v = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
        audio.volume = v;
        document.getElementById('volFill').style.width = (v * 100) + '%';
    });

    function setPlayIcon(playing) {
        document.getElementById('playIcon').innerHTML = playing
            ? '<path d="M6 19h4V5H6zm8-14v14h4V5z"/>'   // пауза
            : '<path d="M8 5v14l11-7z"/>';                 // плей
    }

    function updateListHighlight() {
        document.querySelectorAll('.track-item').forEach((el, i) => {
            el.classList.toggle('playing', i === curIdx && isPlaying);
        });
    }

    // ── Навигация ──────────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);

    function openTracks() {
        renderList();
        $('navTitle').innerText = 'Треки';
        $('mainScreen').classList.remove('active');
        $('trackScreen').classList.add('active');
        document.body.style.background = '#1c1f24';
        $('backBtn').style.display = 'block';
    }

    function openPlayer() {
        $('navTitle').innerText = TRACKS[curIdx].title;
        $('trackScreen').classList.remove('active');
        $('playerScreen').classList.add('active');
        document.body.style.background = '#0e1014';
        $('backBtn').style.display = 'block';
    }

    function goBack() {
        if ($('playerScreen').classList.contains('active')) {
            $('playerScreen').classList.remove('active');
            $('trackScreen').classList.add('active');
            $('navTitle').innerText = 'Треки';
            document.body.style.background = '#1c1f24';
            updateListHighlight();
        } else {
            $('trackScreen').classList.remove('active');
            $('mainScreen').classList.add('active');
            $('navTitle').innerText = 'MORGENSHTERN';
            document.body.style.background = '#2a2f38';
            $('backBtn').style.display = 'none';
        }
    }

    function exitApp() { window.close(); setTimeout(() => window.location.href='about:blank', 100); }

    document.addEventListener('touchmove', e => {
        if (!e.target.closest('.screen')) e.preventDefault();
    }, { passive: false });
</script>
</body>
</html>
