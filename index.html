<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="img/morgen.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>MORGENSHTERN</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>

<div class="app">
    <div class="navbar">
        <div class="back-btn" id="backBtn" onclick="goBack()">Назад</div>
        <div class="nav-title" id="navTitle">MORGENSHTERN</div>
    </div>

    <!-- Главный экран -->
    <div class="screen main-screen active" id="mainScreen">
        <div class="main-content">
            <div class="cover-wrap"><img src="img/morgen.jpg" alt=""></div>
            <div class="main-title">MORGENSHTERN</div>
            <div class="main-sub">Слушать бесплатно без интернет соединения</div>

            <div class="main-btn" onclick="openTracks()">
                <span>Слушать моргенштерн</span>
            </div>

            <a href="https://github.com/Gibsy" target="_blank" class="main-btn">
                <span>Авторы</span>
            </a>

            <div class="main-btn" onclick="location.reload()">
                <span>Выйти</span>
            </div>
        </div>
    </div>

    <!-- Экран списка -->
    <div class="screen" id="trackScreen">
        <ul class="track-list" id="trackList"></ul>
    </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
